<section id="cta" class="py-16 bg-slate-950 bg-grid-pattern">
  <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
    
    <!-- Dark themed CTA Container with subtle glow -->
    <div class="relative overflow-hidden rounded-3xl border border-white/5 bg-slate-900/30 px-8 py-12 shadow-2xl sm:px-12 sm:py-16 lg:flex lg:items-center lg:justify-between gap-12">
      <!-- Glow background -->
      <div class="absolute -right-24 -top-24 h-80 w-80 rounded-full bg-blue-600/10 blur-[120px] pointer-events-none"></div>
      <div class="absolute -left-24 -bottom-24 h-80 w-80 rounded-full bg-indigo-500/10 blur-[120px] pointer-events-none"></div>

      <!-- Text Side (Left Column) -->
      <div class="relative z-10 max-w-xl text-left space-y-4">
        <!-- Badge -->
        <span class="text-xs font-bold tracking-widest text-blue-500 uppercase font-mono block">
          EMPIEZA HOY
        </span>
        
        <!-- Header -->
        <h3 class="font-display text-3xl font-extrabold tracking-tight text-white sm:text-4xl leading-tight">
          ¿Listo para tener una página que trabaja por ti?
        </h3>
        
        <!-- Description -->
        <p class="text-sm sm:text-base text-slate-400 font-light leading-relaxed">
          Creamos tu sitio, conectamos la IA a tu negocio y en 2 semanas tienes un sistema que genera contenido y clientes solo.
        </p>
      </div>

      <!-- Button & Info Side (Right Column) -->
      <div class="relative z-10 mt-8 lg:mt-0 flex flex-col items-center lg:items-end gap-4 shrink-0 w-full sm:w-auto">
        <!-- Spots Left Badge -->
        <div class="inline-flex items-center gap-2 rounded-full border border-emerald-500/20 bg-emerald-500/10 px-4 py-1.5 text-xs font-semibold text-emerald-400">
          <span class="h-1.5 w-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
          <span>3 lugares disponibles este mes</span>
        </div>

        <!-- Consultation Button -->
        <button 
          (click)="openConsultation()" 
          class="w-full sm:w-auto rounded-xl border border-white/10 bg-white/5 hover:bg-white/10 px-8 py-4 text-sm font-semibold text-white transition-all duration-300 hover:border-white/20 active:scale-[0.98] cursor-pointer shadow-lg text-center">
          Agenda tu consulta gratis
        </button>

        <!-- Subtext -->
        <span class="text-xs text-slate-500 font-light tracking-wide text-center lg:text-right">
          Sin compromiso · 15 minutos · por videollamada
        </span>
      </div>
    </div>

  </div>
</section>
