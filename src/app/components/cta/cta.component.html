<section id="cta" class="py-12 bg-slate-50 dark:bg-slate-950">
  <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
    
    <!-- Electric Blue CTA Banner -->
    <div class="relative overflow-hidden rounded-3xl bg-gradient-to-r from-blue-600 via-blue-600 to-indigo-700 px-8 py-12 shadow-2xl sm:px-12 sm:py-16 md:px-16 md:py-20 lg:flex lg:items-center lg:justify-between gap-12">
      <!-- Glow lines/effects on top of card -->
      <div class="absolute -right-12 -top-12 h-60 w-60 rounded-full bg-slate-900/10 dark:bg-white/10 blur-2xl"></div>
      <div class="absolute -left-12 -bottom-12 h-60 w-60 rounded-full bg-indigo-500/20 blur-2xl"></div>

      <!-- Text Side (Left Column) -->
      <div class="relative z-10 max-w-2xl text-left space-y-4">
        <!-- Badge -->
        <span class="inline-flex items-center gap-1.5 rounded-full border border-white/20 bg-slate-900/10 dark:bg-white/10 px-3 py-1 text-xs font-semibold text-slate-900 dark:text-white tracking-wider uppercase">
          Empieza la transformación hoy
        </span>
        
        <!-- Header -->
        <h3 class="font-display text-3xl font-extrabold tracking-tight text-slate-900 dark:text-white sm:text-4xl lg:text-5xl leading-tight">
          ¿Listo para tener una página que trabaja por ti?
        </h3>
        
        <!-- Description -->
        <p class="text-sm sm:text-base text-blue-100 font-light max-w-lg">
          Creamos tu página, conectamos la IA y tu negocio empieza a crecer de forma automática.
        </p>
      </div>

      <!-- Button Side (Right Column) -->
      <div class="relative z-10 mt-8 flex flex-col items-center lg:items-end lg:mt-0 flex-shrink-0">
        <p-button 
          (onClick)="openConsultation()" 
          label="Agenda tu consulta gratis" 
          icon="pi pi-calendar" 
          [rounded]="true" 
          styleClass="bg-white hover:bg-slate-100 text-blue-600 border-none font-bold px-8 py-4 shadow-[0_10px_25px_rgba(0,0,0,0.15)] transition-all duration-300 hover:scale-[1.02] active:scale-[0.98]">
        </p-button>
        <span class="mt-3 text-xs text-blue-100 font-medium tracking-wide">
          Sin compromiso • 15 minutos
        </span>
      </div>
    </div>

  </div>
</section>
