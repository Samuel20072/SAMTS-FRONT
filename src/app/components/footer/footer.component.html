<footer id="footer" class="bg-slate-950 border-t border-slate-900/60 pt-16 pb-8 transition-colors duration-300">
  <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
    
    <!-- Top Grid -->
    <div class="grid grid-cols-1 gap-10 md:grid-cols-2 lg:grid-cols-12 mb-16">
      
      <!-- Brand Description (Col span 5) -->
      <div class="lg:col-span-5 space-y-4 flex flex-col items-start text-left">
        <span class="font-display text-2xl font-bold tracking-tight text-white cursor-pointer" (click)="scrollToSection('hero')">
          <span class="text-blue-500 font-extrabold">[</span>SAMTS<span class="text-blue-500 font-extrabold">]</span>
        </span>
        <p class="text-xs sm:text-sm text-slate-400 font-light max-w-sm leading-relaxed">
          Creamos páginas que trabajan por ti y hacen crecer tu negocio mediante IA de última generación.
        </p>
        
        <!-- Social Icons -->
        <div class="flex items-center gap-3 pt-2">
          <a 
            href="https://samts.ai" 
            target="_blank"
            class="w-9 h-9 rounded-lg border border-slate-900 bg-slate-950 hover:bg-slate-900 flex items-center justify-center text-slate-400 hover:text-blue-400 hover:border-slate-800 transition-all duration-300"
            aria-label="Sitio Web">
            <i class="pi pi-globe text-sm"></i>
          </a>
          <a 
            href="https://instagram.com" 
            target="_blank"
            class="w-9 h-9 rounded-lg border border-slate-900 bg-slate-950 hover:bg-slate-900 flex items-center justify-center text-slate-400 hover:text-pink-400 hover:border-slate-800 transition-all duration-300"
            aria-label="Instagram">
            <i class="pi pi-instagram text-sm"></i>
          </a>
          <a 
            href="https://linkedin.com" 
            target="_blank"
            class="w-9 h-9 rounded-lg border border-slate-900 bg-slate-950 hover:bg-slate-900 flex items-center justify-center text-slate-400 hover:text-blue-500 hover:border-slate-800 transition-all duration-300"
            aria-label="LinkedIn">
            <i class="pi pi-linkedin text-sm"></i>
          </a>
        </div>
      </div>

      <!-- Spacer for large screens -->
      <div class="hidden lg:block lg:col-span-1"></div>

      <!-- Servicios Links (Col span 2) -->
      <div class="lg:col-span-2 space-y-4 flex flex-col items-start text-left">
        <h4 class="text-xs font-bold tracking-wider text-white uppercase">Servicios</h4>
        <ul class="space-y-2 text-xs sm:text-sm font-light">
          <li *ngFor="let item of services">
            <button 
              (click)="scrollToSection(item.link)" 
              class="text-slate-400 hover:text-white transition-colors duration-200 cursor-pointer">
              {{ item.name }}
            </button>
          </li>
        </ul>
      </div>

      <!-- Empresa Links (Col span 2) -->
      <div class="lg:col-span-2 space-y-4 flex flex-col items-start text-left">
        <h4 class="text-xs font-bold tracking-wider text-white uppercase">Empresa</h4>
        <ul class="space-y-2 text-xs sm:text-sm font-light">
          <li *ngFor="let item of company">
            <button 
              (click)="scrollToSection(item.link)" 
              class="text-slate-400 hover:text-white transition-colors duration-200 cursor-pointer">
              {{ item.name }}
            </button>
          </li>
        </ul>
      </div>

      <!-- Legal Links (Col span 2) -->
      <div class="lg:col-span-2 space-y-4 flex flex-col items-start text-left">
        <h4 class="text-xs font-bold tracking-wider text-white uppercase">Legal</h4>
        <ul class="space-y-2 text-xs sm:text-sm font-light">
          <li *ngFor="let item of legal">
            <button 
              (click)="scrollToSection(item.link)" 
              class="text-slate-400 hover:text-white transition-colors duration-200 cursor-pointer">
              {{ item.name }}
            </button>
          </li>
        </ul>
      </div>

    </div>

    <!-- Bottom Copyright Bar -->
    <div class="border-t border-slate-900/60 pt-8 flex flex-col sm:flex-row items-center justify-between gap-4 text-xs text-slate-500 font-light">
      <div>
        <span>© {{ currentYear }} SAMTS. Todos los derechos reservados.</span>
      </div>
      
      <div class="flex items-center gap-1">
        <span>Hecho con</span>
        <i class="pi pi-heart-fill text-red-500 animate-pulse"></i>
        <span>en Colombia</span>
      </div>
    </div>

  </div>
</footer>
