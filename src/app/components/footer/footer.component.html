<footer id="footer" class="bg-slate-950 border-t border-white/5 pt-16 pb-8 transition-colors duration-300">
  <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
    
    <!-- Top Grid -->
    <div class="grid grid-cols-1 gap-10 md:grid-cols-2 lg:grid-cols-12 mb-16">
      
      <!-- Brand Description (Col span 5) -->
      <div class="lg:col-span-5 space-y-5 flex flex-col items-start text-left">
        <span class="font-display text-xl font-bold tracking-tight text-white cursor-pointer" (click)="scrollToSection('hero')">
          <span class="text-blue-500 font-extrabold">[</span>SAMTS<span class="text-blue-500 font-extrabold">]</span>
        </span>
        <p class="text-xs sm:text-sm text-slate-400 font-light max-w-sm leading-relaxed">
          Sistemas Web Inteligentes para negocios que quieren crecer sin perder tiempo.
        </p>
        
        <!-- Social Icons (3 outline square icons as per mockup) -->
        <div class="flex items-center gap-3 pt-2">
          <a 
            href="#" 
            class="w-9 h-9 rounded-lg border border-white/5 bg-slate-950 hover:bg-slate-900 flex items-center justify-center text-slate-500 hover:text-white transition-all duration-300"
            aria-label="Social Link 1">
            <i class="pi pi-twitter text-xs"></i>
          </a>
          <a 
            href="#" 
            class="w-9 h-9 rounded-lg border border-white/5 bg-slate-950 hover:bg-slate-900 flex items-center justify-center text-slate-500 hover:text-white transition-all duration-300"
            aria-label="Social Link 2">
            <i class="pi pi-instagram text-xs"></i>
          </a>
          <a 
            href="#" 
            class="w-9 h-9 rounded-lg border border-white/5 bg-slate-950 hover:bg-slate-900 flex items-center justify-center text-slate-500 hover:text-white transition-all duration-300"
            aria-label="Social Link 3">
            <i class="pi pi-linkedin text-xs"></i>
          </a>
        </div>
      </div>

      <!-- Spacer for large screens -->
      <div class="hidden lg:block lg:col-span-1"></div>

      <!-- Servicios Links (Col span 2) -->
      <div class="lg:col-span-2 space-y-4 flex flex-col items-start text-left">
        <h4 class="text-xs font-bold tracking-wider text-white uppercase font-mono">Servicios</h4>
        <ul class="space-y-3 text-xs sm:text-sm font-light">
          <li *ngFor="let item of services">
            <button 
              (click)="scrollToSection(item.link)" 
              class="text-slate-400 hover:text-white transition-colors duration-200 cursor-pointer">
              {{ item.name }}
            </button>
          </li>
        </ul>
      </div>

      <!-- Empresa Links (Col span 2) -->
      <div class="lg:col-span-2 space-y-4 flex flex-col items-start text-left">
        <h4 class="text-xs font-bold tracking-wider text-white uppercase font-mono">Empresa</h4>
        <ul class="space-y-3 text-xs sm:text-sm font-light">
          <li *ngFor="let item of company">
            <button 
              (click)="scrollToSection(item.link)" 
              class="text-slate-400 hover:text-white transition-colors duration-200 cursor-pointer">
              {{ item.name }}
            </button>
          </li>
        </ul>
      </div>

      <!-- Legal Links (Col span 2) -->
      <div class="lg:col-span-2 space-y-4 flex flex-col items-start text-left">
        <h4 class="text-xs font-bold tracking-wider text-white uppercase font-mono">Legal</h4>
        <ul class="space-y-3 text-xs sm:text-sm font-light">
          <li *ngFor="let item of legal">
            <a 
              [href]="item.link" 
              class="text-slate-400 hover:text-white transition-colors duration-200 block">
              {{ item.name }}
            </a>
          </li>
        </ul>
      </div>

    </div>

    <!-- Bottom Copyright Bar -->
    <div class="border-t border-white/5 pt-8 flex flex-col md:flex-row items-center justify-between gap-6 text-xs text-slate-500 font-light">
      <div>
        <span>© 2026 SAMTS. Todos los derechos reservados.</span>
      </div>
      
      <!-- Central Operating Systems Badge -->
      <div class="inline-flex items-center gap-2 rounded-full border border-emerald-500/10 bg-emerald-500/5 px-3 py-1 text-[10px] font-semibold text-emerald-400">
        <span class="h-1.5 w-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
        <span>Todos los sistemas operativos</span>
      </div>
      
      <!-- Right Badge/Country -->
      <div class="flex items-center gap-1.5">
        <span>Hecho con</span>
        <i class="pi pi-heart-fill text-red-500 animate-pulse text-[10px]"></i>
        <span>en Colombia</span>
      </div>
    </div>

  </div>
</footer>
