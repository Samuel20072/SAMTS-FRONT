<section id="services" class="relative py-28 bg-slate-50 dark:bg-slate-950 overflow-hidden bg-grid-pattern">
  
  <!-- Glowing Background Orbs -->
  <div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
    <div class="absolute top-[30%] left-[-10%] h-[500px] w-[500px] rounded-full bg-blue-600/5 blur-[150px]"></div>
    <div class="absolute bottom-[10%] right-[-10%] h-[500px] w-[500px] rounded-full bg-indigo-500/5 blur-[150px]"></div>
  </div>

  <div class="relative z-10 mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
    
    <!-- Section Header -->
    <div class="max-w-3xl text-left mb-16">
      <div class="flex items-center gap-2 text-xs font-bold tracking-widest text-blue-500 uppercase mb-3 font-mono">
        <span class="w-1.5 h-1.5 rounded-full bg-blue-500"></span>
        <span>Nuestros Servicios</span>
      </div>
      
      <h2 class="font-display text-4xl sm:text-5xl font-extrabold text-slate-900 dark:text-white tracking-tight mb-4">
        Todo lo que tu negocio necesita en un solo lugar.
      </h2>
      
      <p class="text-base sm:text-lg text-slate-600 dark:text-slate-400 font-light leading-relaxed">
        Desde la página que te hace ver profesional hasta la IA que trabaja mientras duermes.
      </p>
    </div>

    <!-- Cards Grid (2 columns as per mockup) -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div 
        *ngFor="let service of services" 
        (click)="openConsultation()"
        class="relative flex flex-col justify-between p-8 rounded-3xl border border-slate-200 dark:border-white/5 bg-slate-50 dark:bg-slate-950/40 hover:bg-slate-100 dark:bg-slate-900/20 hover:border-slate-300 dark:border-white/10 transition-all duration-300 min-h-[280px] cursor-pointer group">
        
        <!-- Hover Glow effect -->
        <div class="absolute inset-0 bg-gradient-to-br from-blue-500/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500 rounded-3xl -z-10"></div>
        
        <div>
          <!-- Badge if present -->
          <div *ngIf="service.badge" class="mb-4">
            <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-[9px] font-bold bg-blue-500/10 text-blue-400 border border-blue-500/20 tracking-wider">
              {{ service.badge }}
            </span>
          </div>

          <!-- Icon Placeholder (Simple elegant square icon placeholder block matching the mockup image style) -->
          <div class="w-10 h-10 rounded-xl bg-slate-100 dark:bg-slate-900/60 border border-slate-200 dark:border-white/5 flex items-center justify-center text-slate-600 dark:text-slate-400 mb-6 group-hover:text-slate-900 dark:text-white group-hover:border-slate-300 dark:border-white/10 transition-all">
            <i class="pi text-sm" [ngClass]="{
              'pi-sparkles': service.title === 'IA Automática',
              'pi-desktop': service.title === 'Páginas Web Premium',
              'pi-shopping-cart': service.title === 'Tiendas Online',
              'pi-rocket': service.title === 'Landing Pages'
            }"></i>
          </div>

          <!-- Title & Description -->
          <h3 class="text-xl font-bold text-slate-900 dark:text-white mb-3 group-hover:text-blue-400 transition-colors">
            {{ service.title }}
          </h3>
          <p class="text-xs sm:text-sm text-slate-600 dark:text-slate-400 leading-relaxed font-light mb-8 max-w-md">
            {{ service.description }}
          </p>
        </div>

        <!-- Tags List -->
        <div class="flex flex-wrap gap-2 mt-auto">
          <span 
            *ngFor="let tag of service.tags" 
            class="text-[10px] text-slate-600 dark:text-slate-400 bg-slate-100 dark:bg-slate-900/60 border border-slate-200 dark:border-white/5 px-2.5 py-1 rounded-full font-light">
            {{ tag }}
          </span>
        </div>

      </div>
    </div>

  </div>
</section>
