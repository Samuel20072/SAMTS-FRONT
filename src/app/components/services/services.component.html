<section id="services" class="relative py-32 bg-slate-50 dark:bg-slate-950 overflow-hidden">
  
  <!-- Animated Background Orbs -->
  <div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
    <div class="absolute top-[20%] left-[-10%] h-[500px] w-[500px] rounded-full bg-blue-600/10 blur-[150px] animate-pulse mix-blend-screen"
         [style.transform]="'translateY(' + (scrollY() * -0.15) + 'px)'"></div>
    <div class="absolute bottom-[-10%] right-[-5%] h-[600px] w-[600px] rounded-full bg-indigo-500/10 blur-[160px] animate-pulse mix-blend-screen" style="animation-delay: 3s;"
         [style.transform]="'translateY(' + (scrollY() * -0.05) + 'px)'"></div>
    <div class="absolute top-[50%] left-[50%] -translate-x-1/2 -translate-y-1/2 h-[800px] w-[100%] bg-gradient-to-b from-transparent via-blue-900/5 to-transparent blur-[100px] -z-10"></div>
  </div>

  <div class="relative z-10 mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
    
    <!-- Section Header -->
    <div class="text-center max-w-4xl mx-auto space-y-6 mb-24"
         [style.transform]="'translateY(' + (scrollY() * 0.05) + 'px)'"
         [style.opacity]="1">
      
      <div class="inline-flex items-center gap-2 rounded-full border border-slate-300 dark:border-white/10 bg-slate-900/5 dark:bg-white/5 px-4 py-2 text-xs md:text-sm font-semibold text-slate-700 dark:text-slate-300 shadow-lg backdrop-blur-md mb-2">
        <i class="pi pi-sparkles text-blue-400"></i>
        <span class="uppercase tracking-widest">Nuestros Servicios</span>
      </div>
      
      <h2 class="font-display text-4xl sm:text-5xl md:text-6xl font-extrabold text-slate-900 dark:text-white tracking-tight leading-[1.15] drop-shadow-2xl">
        Soluciones digitales que 
        <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 via-cyan-300 to-indigo-400">
          impulsan tu negocio
        </span>
      </h2>
      
      <p class="text-lg sm:text-xl text-slate-600 dark:text-slate-400 font-light max-w-2xl mx-auto leading-relaxed">
        Ecosistemas web de última generación diseñados para maximizar tus conversiones y automatizar tu crecimiento.
      </p>
    </div>

    <!-- Cards Grid -->
    <div class="grid grid-cols-1 gap-8 sm:grid-cols-2 lg:grid-cols-4 relative z-20"
         [style.transform]="'translateY(' + (scrollY() * 0.08) + 'px)'">
      <p-card 
        *ngFor="let service of services; let i = index" 
        (click)="openConsultation()"
        styleClass="h-full border border-slate-200 dark:border-white/5 bg-slate-100 dark:bg-slate-900/40 backdrop-blur-xl hover:bg-slate-200 dark:bg-slate-800/60 hover:border-slate-300 dark:border-white/10 hover:shadow-[0_0_40px_rgba(59,130,246,0.15)] transition-all duration-500 rounded-3xl overflow-hidden cursor-pointer group"
        class="block h-full transform-gpu transition-transform hover:-translate-y-2">
        
        <!-- Glowing gradient on hover -->
        <div class="absolute inset-0 bg-gradient-to-br from-white/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500 z-0"></div>

        <div class="relative z-10 flex flex-col h-full space-y-6 p-6 md:p-8">
          <!-- Icon Badge -->
          <div class="w-16 h-16 rounded-2xl flex items-center justify-center border border-slate-300 dark:border-white/10 group-hover:scale-110 transition-transform duration-500 group-hover:shadow-lg shadow-black/50"
               [ngClass]="service.iconBg + ' ' + service.colorClass">
            <i class="pi text-2xl" [ngClass]="service.icon"></i>
          </div>

          <!-- Title & Description -->
          <div class="space-y-4">
            <h4 class="font-display text-2xl font-bold text-slate-900 dark:text-white group-hover:text-transparent group-hover:bg-clip-text group-hover:bg-gradient-to-r group-hover:from-white group-hover:to-slate-400 transition-all duration-300">
              {{ service.title }}
            </h4>
            <p class="text-slate-600 dark:text-slate-400 text-sm md:text-base leading-relaxed font-light group-hover:text-slate-700 dark:text-slate-300 transition-colors duration-300">
              {{ service.description }}
            </p>
          </div>

          <!-- Learn More Link -->
          <div class="pt-6 mt-auto flex items-center gap-2 text-sm font-semibold text-slate-700 dark:text-slate-300 group-hover:text-slate-900 dark:text-white transition-colors duration-300 border-t border-slate-200 dark:border-white/5 group-hover:border-slate-300 dark:border-white/10">
            <span class="group-hover:tracking-wide transition-all duration-300">Explorar solución</span>
            <div class="w-6 h-6 rounded-full bg-slate-900/5 dark:bg-white/5 flex items-center justify-center group-hover:bg-blue-500/20 group-hover:text-blue-400 transition-colors duration-300 ml-auto">
              <i class="pi pi-arrow-right text-[10px] transform group-hover:translate-x-0.5 transition-transform"></i>
            </div>
          </div>
        </div>
      </p-card>
    </div>

  </div>
</section>
