<div class="min-h-screen bg-slate-50 dark:bg-slate-950 flex items-center justify-center relative overflow-hidden">
  
  <!-- Animated Background Orbs -->
  <div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
    <div class="absolute top-[-10%] left-[-10%] h-[500px] w-[500px] rounded-full bg-blue-600/20 blur-[150px] animate-pulse mix-blend-screen"></div>
    <div class="absolute bottom-[-10%] right-[-10%] h-[500px] w-[500px] rounded-full bg-indigo-500/20 blur-[150px] animate-pulse mix-blend-screen" style="animation-delay: 2s;"></div>
  </div>

  <!-- Back to Home -->
  <a routerLink="/" class="absolute top-6 left-6 md:top-8 md:left-8 z-20 flex items-center gap-2 text-sm text-slate-600 dark:text-slate-400 hover:text-slate-900 dark:text-white transition-colors group">
    <div class="w-8 h-8 rounded-full bg-slate-900/5 dark:bg-white/5 border border-slate-300 dark:border-white/10 flex items-center justify-center group-hover:bg-slate-900/10 dark:bg-white/10 transition-colors">
      <i class="pi pi-arrow-left text-xs group-hover:-translate-x-0.5 transition-transform"></i>
    </div>
    <span>Volver al inicio</span>
  </a>

  <!-- Login Card -->
  <div class="relative z-10 w-full max-w-md px-4">
    <div class="relative bg-slate-100 dark:bg-slate-900/50 backdrop-blur-2xl border border-slate-300 dark:border-white/10 rounded-3xl p-8 md:p-10 shadow-[0_0_50px_rgba(0,0,0,0.5)] overflow-hidden">
      
      <!-- Top highlight -->
      <div class="absolute top-0 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-blue-500/50 to-transparent"></div>

      <!-- Header -->
      <div class="text-center mb-10">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-blue-500/20 to-indigo-500/20 border border-slate-300 dark:border-white/10 mb-6 shadow-lg shadow-blue-500/10">
          <i class="pi pi-shield text-2xl text-blue-400"></i>
        </div>
        <h1 class="font-display text-3xl font-bold text-slate-900 dark:text-white mb-2">Neural Admin</h1>
        <p class="text-slate-600 dark:text-slate-400 text-sm">Ingresa a tu panel de control y gestión de IA</p>
      </div>

      <!-- Form -->
      <form (ngSubmit)="login()" class="space-y-6">
        
        <div class="space-y-2">
          <label class="text-xs font-semibold text-slate-700 dark:text-slate-300 uppercase tracking-wider ml-1">Correo Electrónico</label>
          <div class="relative">
            <i class="pi pi-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 dark:text-slate-500 z-10"></i>
            <input 
              type="email" 
              pInputText 
              [(ngModel)]="email" 
              name="email"
              class="w-full bg-slate-50 dark:bg-slate-950/50 border border-slate-300 dark:border-white/10 rounded-xl py-3.5 pl-11 pr-4 text-slate-900 dark:text-white placeholder:text-slate-600 focus:border-blue-500/50 focus:ring-1 focus:ring-blue-500/50 transition-all outline-none shadow-inner"
              placeholder="admin@samts.com"
              required>
          </div>
        </div>

        <div class="space-y-2">
          <div class="flex items-center justify-between ml-1">
            <label class="text-xs font-semibold text-slate-700 dark:text-slate-300 uppercase tracking-wider">Contraseña</label>
            <a href="#" class="text-xs text-blue-400 hover:text-blue-300 transition-colors">¿Olvidaste tu contraseña?</a>
          </div>
          <div class="relative">
            <i class="pi pi-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 dark:text-slate-500 z-10"></i>
            <input 
              type="password" 
              pInputText 
              [(ngModel)]="password" 
              name="password"
              class="w-full bg-slate-50 dark:bg-slate-950/50 border border-slate-300 dark:border-white/10 rounded-xl py-3.5 pl-11 pr-4 text-slate-900 dark:text-white placeholder:text-slate-600 focus:border-blue-500/50 focus:ring-1 focus:ring-blue-500/50 transition-all outline-none shadow-inner"
              placeholder="••••••••"
              required>
          </div>
        </div>

        <button 
          type="submit"
          class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-slate-900 dark:text-white font-semibold py-4 rounded-xl shadow-[0_0_20px_rgba(59,130,246,0.3)] hover:shadow-[0_0_30px_rgba(59,130,246,0.5)] transition-all duration-300 flex items-center justify-center gap-2 mt-2">
          <span>Iniciar Sesión</span>
          <i class="pi pi-sign-in"></i>
        </button>

      </form>
    </div>
    
    <!-- Footer text -->
    <p class="text-center text-xs text-slate-500 dark:text-slate-500 mt-8">
      Panel de control exclusivo. Acceso no autorizado prohibido.
    </p>
  </div>
</div>
