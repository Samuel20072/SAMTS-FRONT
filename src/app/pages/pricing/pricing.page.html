<app-header></app-header>

<main class="min-h-screen bg-slate-50 dark:bg-slate-950 pt-20 overflow-hidden relative">
  <!-- Glowing Background Effects -->
  <div class="absolute top-1/4 right-1/4 h-[500px] w-[500px] rounded-full bg-blue-600/10 blur-[150px] pointer-events-none mix-blend-screen"></div>
  <div class="absolute bottom-1/3 left-1/4 h-[600px] w-[600px] rounded-full bg-cyan-500/10 blur-[150px] pointer-events-none mix-blend-screen"></div>

  <!-- Header -->
  <section class="relative py-20 text-center px-4 sm:px-6 lg:px-8 max-w-4xl mx-auto z-10">
    <div class="inline-flex items-center gap-2 rounded-full border border-blue-500/30 bg-blue-500/10 px-4 py-2 text-xs md:text-sm font-semibold text-blue-400 mb-8 animate-fade-in">
      <i class="pi pi-tag text-xs"></i>
      <span class="uppercase tracking-widest">Inversión</span>
    </div>
    <h1 class="font-display text-5xl sm:text-6xl lg:text-7xl font-extrabold text-slate-900 dark:text-white tracking-tight leading-tight drop-shadow-2xl mb-6">
      Precios Transparentes, <br/>
      <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 via-cyan-400 to-indigo-400">
        Retorno Asegurado.
      </span>
    </h1>
    <p class="text-lg text-slate-600 dark:text-slate-400 font-light max-w-2xl mx-auto leading-relaxed">
      No vendemos simples páginas web, construimos motores de ventas automatizados con Inteligencia Artificial.
    </p>
  </section>

  <!-- Pricing Grid -->
  <section class="relative z-10 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pb-32">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-8 items-center">
      
      <!-- Cards -->
      <div *ngFor="let plan of plans" 
           class="rounded-3xl border transition-all duration-300 relative group"
           [ngClass]="plan.highlight ? 'bg-slate-100 dark:bg-slate-900/80 border-blue-500/50 shadow-[0_0_50px_rgba(59,130,246,0.15)] transform md:-translate-y-4 py-12' : 'bg-slate-100 dark:bg-slate-900/40 border-slate-300 dark:border-white/10 hover:border-white/20 py-10'">
        
        <!-- Highlight Badge -->
        <div *ngIf="plan.highlight" class="absolute -top-4 left-1/2 -translate-x-1/2 bg-gradient-to-r from-blue-600 to-indigo-600 text-slate-900 dark:text-white text-xs font-bold uppercase tracking-widest py-1.5 px-4 rounded-full shadow-lg">
          Más Popular
        </div>

        <div class="px-8 text-center border-b border-slate-300 dark:border-white/10 pb-8">
          <h3 class="text-xl font-display font-bold text-slate-900 dark:text-white mb-2">{{ plan.name }}</h3>
          <p class="text-slate-600 dark:text-slate-400 text-sm h-10">{{ plan.description }}</p>
          <div class="mt-6 flex items-end justify-center gap-1">
            <span class="text-4xl sm:text-5xl font-display font-extrabold text-slate-900 dark:text-white">{{ plan.price }}</span>
            <span class="text-sm text-slate-500 dark:text-slate-500 mb-1">/{{ plan.period }}</span>
          </div>
        </div>

        <div class="px-8 pt-8">
          <ul class="space-y-4 mb-8">
            <li *ngFor="let feature of plan.features" class="flex items-start gap-3">
              <i class="pi pi-check-circle text-blue-400 mt-0.5"></i>
              <span class="text-sm text-slate-700 dark:text-slate-300">{{ feature }}</span>
            </li>
          </ul>

          <button 
            (click)="openConsultation()"
            class="w-full rounded-xl py-3.5 font-semibold transition-all duration-300"
            [ngClass]="plan.highlight ? 'bg-blue-600 hover:bg-blue-500 text-slate-900 dark:text-white shadow-[0_0_20px_rgba(59,130,246,0.3)]' : 'bg-slate-900/5 dark:bg-white/5 hover:bg-slate-900/10 dark:bg-white/10 text-slate-900 dark:text-white border border-slate-300 dark:border-white/10'">
            Comenzar Proyecto
          </button>
        </div>
      </div>

    </div>
  </section>
</main>

<app-footer></app-footer>
<app-consultation-modal></app-consultation-modal>
