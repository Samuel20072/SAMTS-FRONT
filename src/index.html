<!doctype html>
<html lang="es" class="scroll-smooth">
<head>
  <meta charset="utf-8">
  <title>SAMTS | Soluciones Web & Agentes de IA para tu Negocio</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Creamos ecosistemas digitales premium potenciados por Inteligencia Artificial que evolucionan, venden y se autogestionan 24/7.">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <!-- Prevent flash of wrong theme: read localStorage before Angular loads -->
  <script>
    (function() {
      var theme = localStorage.getItem('samts-theme');
      if (theme === 'light') {
        document.documentElement.classList.remove('dark');
      } else {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>

  <style>
    /* ===== SAMTS Splash Screen ===== */
    #samts-splash {
      position: fixed;
      inset: 0;
      z-index: 99999;
      background: #020617;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: 'Outfit', 'Inter', sans-serif;
    }

    /* ── Particle canvas ── */
    #samts-splash canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    /* ── Radial glow behind logo ── */
    .splash-glow {
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(37,99,235,0.18) 0%, transparent 70%);
      animation: samts-pulse-glow 2.4s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes samts-pulse-glow {
      0%, 100% { transform: scale(1);   opacity: 0.7; }
      50%       { transform: scale(1.2); opacity: 1;   }
    }

    /* ── Logo wrapper ── */
    .splash-logo-wrap {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* ── SVG logo ── */
    .splash-logo-svg {
      width: clamp(260px, 40vw, 480px);
      opacity: 0;
      transform: scale(0.6) translateY(30px);
      animation: samts-logo-in 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s forwards;
      filter: drop-shadow(0 0 32px rgba(37,99,235,0.55));
    }

    @keyframes samts-logo-in {
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* ── Tagline text ── */
    .splash-tagline {
      color: #94a3b8;
      font-size: clamp(0.75rem, 2vw, 1rem);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      font-weight: 500;
      margin-top: 14px;
      opacity: 0;
      transform: translateY(10px);
      animation: samts-tag-in 0.7s ease-out 1s forwards;
    }

    @keyframes samts-tag-in {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Progress bar ── */
    .splash-progress-track {
      position: relative;
      z-index: 2;
      margin-top: 52px;
      width: clamp(200px, 30vw, 340px);
      height: 3px;
      background: rgba(255,255,255,0.07);
      border-radius: 999px;
      overflow: hidden;
      opacity: 0;
      animation: samts-tag-in 0.5s ease-out 1.1s forwards;
    }

    .splash-progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #1d4ed8, #3b82f6, #60a5fa);
      border-radius: 999px;
      animation: samts-progress 1.8s cubic-bezier(0.4, 0, 0.2, 1) 1.2s forwards;
      box-shadow: 0 0 12px rgba(59,130,246,0.8);
    }

    @keyframes samts-progress {
      0%   { width: 0%; }
      60%  { width: 75%; }
      100% { width: 100%; }
    }

    /* ── Scanning line effect ── */
    .splash-scan-line {
      position: absolute;
      left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(59,130,246,0.6), transparent);
      animation: samts-scan 2s ease-in-out 0.5s infinite;
      pointer-events: none;
    }

    @keyframes samts-scan {
      0%   { top: -2px;    opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { top: 100%;   opacity: 0; }
    }

    /* ── Corner decorations ── */
    .splash-corner {
      position: absolute;
      width: 40px;
      height: 40px;
      opacity: 0;
      animation: samts-tag-in 0.5s ease-out 0.6s forwards;
    }
    .splash-corner--tl { top: 32px; left: 32px; border-top: 2px solid #3b82f6; border-left: 2px solid #3b82f6; }
    .splash-corner--tr { top: 32px; right: 32px; border-top: 2px solid #3b82f6; border-right: 2px solid #3b82f6; }
    .splash-corner--bl { bottom: 32px; left: 32px; border-bottom: 2px solid #3b82f6; border-left: 2px solid #3b82f6; }
    .splash-corner--br { bottom: 32px; right: 32px; border-bottom: 2px solid #3b82f6; border-right: 2px solid #3b82f6; }

    /* ── Exit animation ── */
    #samts-splash.samts-exit {
      animation: samts-exit 0.7s cubic-bezier(0.4, 0, 1, 1) forwards;
    }

    @keyframes samts-exit {
      0%   { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(1.06); pointer-events: none; }
    }
  </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 font-sans antialiased selection:bg-blue-600 selection:text-white overflow-x-hidden transition-colors duration-300">

  <!-- ════════════════════════════════════════════
       SAMTS SPLASH SCREEN  (removed by Angular)
       ════════════════════════════════════════════ -->
  <div id="samts-splash" aria-hidden="true">
    <!-- Particle canvas -->
    <canvas id="samts-particles"></canvas>

    <!-- Radial glow -->
    <div class="splash-glow"></div>

    <!-- Scan line -->
    <div class="splash-scan-line"></div>

    <!-- Corner decorations -->
    <div class="splash-corner splash-corner--tl"></div>
    <div class="splash-corner splash-corner--tr"></div>
    <div class="splash-corner splash-corner--bl"></div>
    <div class="splash-corner splash-corner--br"></div>

    <!-- Logo + tagline -->
    <div class="splash-logo-wrap">
      <svg class="splash-logo-svg" viewBox="0 0 520 180" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="SAMTS Logo">
        <!-- Left bracket -->
        <text x="0" y="148" font-family="Outfit, Inter, sans-serif" font-size="160" font-weight="900" fill="#ffffff" letter-spacing="-4">[</text>
        <!-- S -->
        <text x="62" y="148" font-family="Outfit, Inter, sans-serif" font-size="160" font-weight="900" fill="#ffffff">S</text>
        <!-- A (blue) -->
        <text x="158" y="148" font-family="Outfit, Inter, sans-serif" font-size="160" font-weight="900" fill="#2563eb">A</text>
        <!-- M -->
        <text x="256" y="148" font-family="Outfit, Inter, sans-serif" font-size="160" font-weight="900" fill="#ffffff">M</text>
        <!-- T -->
        <text x="360" y="148" font-family="Outfit, Inter, sans-serif" font-size="160" font-weight="900" fill="#ffffff">T</text>
        <!-- S -->
        <text x="432" y="148" font-family="Outfit, Inter, sans-serif" font-size="160" font-weight="900" fill="#ffffff">S</text>
        <!-- Right bracket -->
        <text x="488" y="148" font-family="Outfit, Inter, sans-serif" font-size="160" font-weight="900" fill="#ffffff">]</text>
      </svg>
      <p class="splash-tagline">Creamos páginas que trabajan por ti</p>
    </div>

    <!-- Progress bar -->
    <div class="splash-progress-track">
      <div class="splash-progress-fill"></div>
    </div>
  </div>
  <!-- ════════════════════════════════════════════ -->

  <app-root></app-root>

  <script>
    // ── Particle system ──────────────────────────────────────────
    (function () {
      var canvas = document.getElementById('samts-particles');
      var ctx = canvas.getContext('2d');
      var particles = [];
      var W, H;

      function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener('resize', resize);

      function rand(min, max) { return Math.random() * (max - min) + min; }

      for (var i = 0; i < 70; i++) {
        particles.push({
          x: rand(0, W || window.innerWidth),
          y: rand(0, H || window.innerHeight),
          r: rand(1, 2.8),
          dx: rand(-0.3, 0.3),
          dy: rand(-0.5, -0.1),
          alpha: rand(0.2, 0.7)
        });
      }

      function draw() {
        ctx.clearRect(0, 0, W, H);
        particles.forEach(function(p) {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(59,130,246,' + p.alpha + ')';
          ctx.fill();

          p.x += p.dx;
          p.y += p.dy;

          if (p.y < -5)  { p.y = H + 5; p.x = rand(0, W); }
          if (p.x < -5)  { p.x = W + 5; }
          if (p.x > W+5) { p.x = -5; }
        });
        if (document.getElementById('samts-splash')) {
          requestAnimationFrame(draw);
        }
      }
      draw();

      // ── Hide splash when Angular is ready ─────────────────────
      window.__samtsHideSplash = function () {
        var splash = document.getElementById('samts-splash');
        if (!splash) return;
        splash.classList.add('samts-exit');
        setTimeout(function () {
          if (splash.parentNode) splash.parentNode.removeChild(splash);
        }, 750);
      };
    })();
  </script>
</body>
</html>
