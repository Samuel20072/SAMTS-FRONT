<!doctype html>
<html lang="es" class="scroll-smooth">
<head>
  <meta charset="utf-8">
  <title>SAMTS | Soluciones Web & Agentes de IA para tu Negocio</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Creamos ecosistemas digitales premium potenciados por Inteligencia Artificial que evolucionan, venden y se autogestionan 24/7.">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Prevent flash of wrong theme: read localStorage before Angular loads -->
  <script>
    (function() {
      var theme = localStorage.getItem('samts-theme');
      // Default to dark if no preference is saved
      if (theme === 'light') {
        document.documentElement.classList.remove('dark');
      } else {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 font-sans antialiased selection:bg-blue-600 selection:text-white overflow-x-hidden transition-colors duration-300">
  <app-root></app-root>
</body>
</html>
